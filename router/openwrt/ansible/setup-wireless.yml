---
# setup-wireless.yml — Configure WiFi radios + SSIDs
#
# Run AFTER bootstrap (device online via trunk, VLAN interfaces exist).
#
# Usage:
#   ansible-playbook setup-wireless.yml -e ansible_host=<ip>

- name: Setup OpenWRT Wireless
  hosts: aps
  gather_facts: false

  tasks:
    - name: Check connectivity
      community.openwrt.ping:

    - name: Gather facts
      community.openwrt.setup:

    - debug:
        msg: "→ {{ inventory_hostname }} — configure wireless"

    # ── 1. Remove factory defaults ──
    - name: Remove default radio1
      community.openwrt.uci:
        command: absent
        config: wireless
        section: default_radio1
      ignore_errors: true

    - name: Remove default radio0
      community.openwrt.uci:
        command: absent
        config: wireless
        section: default_radio0
      ignore_errors: true

    # ── 2. Radio config ──
    - name: Configure radio0
      community.openwrt.uci:
        command: set
        config: wireless
        section: radio0
        option: "{{ item.opt }}"
        value: "{{ item.val }}"
      loop:
        - { opt: channel, val: auto }
        - { opt: txpower, val: "{{ radio0.txpower | string }}" }
        - { opt: country, val: "{{ wifi_country }}" }
        - { opt: cell_density, val: "0" }

    - name: Configure radio1
      community.openwrt.uci:
        command: set
        config: wireless
        section: radio1
        option: "{{ item.opt }}"
        value: "{{ item.val }}"
      loop:
        - { opt: channel, val: auto }
        - { opt: txpower, val: "{{ radio1.txpower | string }}" }
        - { opt: country, val: "{{ wifi_country }}" }
        - { opt: cell_density, val: "0" }

    # ── 3. SSIDs ──
    - name: Create SSID interfaces
      community.openwrt.uci:
        command: section
        config: wireless
        type: wifi-iface
        name: "wifi_{{ item.key }}"
        find:
          device: "{{ item.value.radio }}"
          ssid: "{{ item.value.ssid }}"
        value:
          device: "{{ item.value.radio }}"
          mode: ap
          ssid: "{{ item.value.ssid }}"
          encryption: "{{ item.value.encryption }}"
          key: "{{ item.value.key }}"
          network: "VLAN_{{ item.value.vlan | upper }}"
          isolate: "{{ '1' if item.value.isolate | default(false) else omit }}"
          ieee80211r: "{{ '1' if item.value.ieee80211r | default(false) else omit }}"
          mobility_domain: "{{ item.value.mobility_domain | default(omit) }}"
          ft_over_ds: "{{ '0' if item.value.ft_over_ds | default(true) else omit }}"
          ft_psk_generate_local: "{{ '1' if item.value.ft_psk_generate_local | default(false) else omit }}"
          ocv: "{{ item.value.ocv | default(omit) | string if item.value.ocv is defined else omit }}"
          dtim_period: "{{ item.value.dtim_period | default(omit) | string }}"
        replace: true
      loop: "{{ ssids | dict2items }}"
      loop_control:
        label: "{{ item.value.ssid }}"
      no_log: true

    # ── 4. Commit + reload ──
    - community.openwrt.uci:
        command: commit
        config: wireless

    - name: Reload network
      community.openwrt.service:
        name: network
        state: reloaded

    - debug:
        msg: "✓ {{ inventory_hostname }} wireless configured"
